name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache: 'pnpm'  <-- এই লাইনটি সরিয়ে দিন বা কমেন্ট করে দিন

      - name: Install dependencies
        # --frozen-lockfile ব্যবহার করবেন না যদি লক-ফাইল না থাকে
        run: pnpm install 

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build
